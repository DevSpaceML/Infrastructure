          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./environments/dev/configuration/certs/main
        run: |
              terraform init -upgrade
      
      - name: Terraform Validate
        working-directory: ./environments/dev/configuration/certs/main
        run: terraform validate 

      - name: Terraform Plan
        working-directory: ./environments/dev/configuration/certs/main
        run: |
          terraform plan -out=tfplan
          terraform show -json tfplan > certs_tfplan.json
          cat certs_tfplan.json

  validate-certs:
    name: validate-certs
    runs-on: ubuntu-latest
