# =========================================================================================================================
# -- Deploys main Dev infrastructure
# -- Resources: env IAM, Network, ALB
# -- CNAME records in Cloudflare DNS for DEV [or staging] environments. 
# =========================================================================================================================

name: Deploy Dev Environment
on:
  push:
    branches: [develop]
    paths: ['infrastructure/environments/dev/**']
  workflow_dispatch:
    inputs:
      region:
        description: 'Deployment region'
        type: choice
        options: [us-east-1, us-east-2, us-west-1]
        required: true  
      dry-run:
        type: boolean
        default: false  
env:
  TF_VERSION: "1.5.0"
  AWS_REGION: ${{ github.event.inputs.region }}
permissions:
  id-token: write
  contents: read

jobs:
  deploy-network:
    name: deploy-network
    runs-on: ubuntu-latest
    
    steps:  
      - name: checkout-code
        uses: actions/checkout@v4
            
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::488347380548:role/gha_deploy
          role-session-name: GitHub-Actions-OIDC-Session
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: false
      
      - name: Prepare Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./environments/dev/network/main
        run: |
              terraform init -upgrade
      
      - name: Terraform Validate
        working-directory: ./environments/dev/network/main
        run: terraform validate 

      - name: Terraform Plan
        working-directory: ./environments/dev/network/main
        run: |
          terraform plan -out=network_tfplan
          terraform show -json tfplan > network_tfplan.json
          cat network_tfplan.json

#      - name: Terraform Apply
#        if: ${{ github.event.inputs.dry-run == 'false' }} 
#        working-directory: ./environments/dev/network/main
#        run: |
#          terraform apply -auto-approve network_tfplan

  deploy-certs:
    name: deploy-certs
