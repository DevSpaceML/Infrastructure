# =========================================================================================================================
# -- Deploys Non-Prod environment [Dev/Staging] infrastructure
# -- Resources: env IAM, Network, ALB
# -- CNAME record in Cloudflare DNS for DEV [or staging] environments. 
# =========================================================================================================================

name: Deploy NonProd Environment
on:
  push:
    branches: [develop]
    paths: ['infrastructure/environments/dev/**']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Choose a non-prod environment'
        type: choice
        options: [dev, staging]
        required: true
      region:
        description: 'Deployment region'
        type: choice
        options: [us-east-1, us-east-2, us-west-1]
        required: true  
      dry-run:
        type: boolean
        default: false  
env:
  TF_VERSION: "1.5.0"
  AWS_REGION: ${{ github.event.inputs.region }}
permissions:
  id-token: write
  contents: read

jobs:
  deploy-network:
    name: deploy-network
    runs-on: ubuntu-latest
    env:
      TARGET_ENV: ${{ github.event.inputs.environment }}  
    
    steps:  
      - name: checkout-code
        uses: actions/checkout@v4
            
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::586098609239:role/GitHubActionsRole
          role-session-name: GitHub-Actions-OIDC-Session
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: false
      
      - name: Prepare Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./environments/$TARGET_ENV/network
        run: |
              terraform init -upgrade
      
      - name: Terraform Validate
        working-directory: ./environments/$TARGET_ENV/network
        run: terraform validate 

      - name: Terraform Plan
        working-directory: ./environments/$TARGET_ENV/network
        run: |
          terraform plan -out=netwrk_tfplan
          terraform show -json tfplan > netwrk_tfplan.json
          cat netwrk_tfplan.json

  deploy-iam:
    name: deploy-iam
    runs-on: ubuntu-latest
    needs: [deploy-network]
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment}}
      region: ${{ github.event.inputs.region }}

    steps:  
      - name: checkout-code
        uses: actions/checkout@v4
            
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::586098609239:role/GitHubActionsRole
          role-session-name: GitHub-Actions-OIDC-Session
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: false
      
      - name: Prepare Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./environments/$TARGET_ENV/iam
        run: |
              terraform init -upgrade
      
      - name: Terraform Validate
        working-directory: ./environments/$TARGET_ENV/iam
        run: terraform validate 

      - name: Terraform Plan
        working-directory: ./environments/$TARGET_ENV/iam
        run: |
          terraform plan -out=tfplan
          terraform show -json tfplan > iam_tfplan.json
          cat iam_tfplan.json  

        






