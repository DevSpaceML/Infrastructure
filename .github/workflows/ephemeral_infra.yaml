name: ephmrl-dev-eks

on:
  repository_dispatch:
    types: [ephmrl-dev-eks]

env:
  TF_VERSION: "1.5.0"
  AWS_REGION: "us-east-1"
  ENVIRONMENT: ${{ github.event.client_payload.config.environment }}

permissions:
  id-token: write
  contents: read  

jobs:
  configure-variables:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.parse_vars.outputs.environment }}
      clustername: ${{ steps.parse_vars.outputs.clustername }}
      region: ${{ steps.parse_vars.outputs.region }}
      dev_cidr: ${{ steps.parse_vars.outputs.dev_cidr }}
      vpcname: ${{ steps.parse_vars.outputs.vpcname }}
      createvpc: ${{ steps.parse_vars.outputs.createvpc }}
      existing_vpc_id: ${{ steps.parse_vars.outputs.existing_vpc_id }}
      public_subnet_cidr: ${{ steps.parse_vars.outputs.public_subnet_cidr }}
      private_subnet_cidr: ${{ steps.parse_vars.outputs.private_subnet_cidr }}
      rds_subnet_cidrs: ${{ steps.parse_vars.outputs.rds_subnet_cidrs }}
      nodegroup_subnet_cidrs: ${{ steps.parse_vars.outputs.nodegroup_subnet_cidrs }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::586098609239:role/GitHubActionsRole
          role-session-name: GitHub-Actions-OIDC-Session
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: false

      - name: config_variables
        shell: bash
        id: parse_vars
        working-directory: ./environments/${{ env.ENVIRONMENT }}
        run: |
          PAYLOAD=$(printf '%s' '${{ tojson(github.event.client_payload.config) }}')
          echo "Current Payload: $PAYLOAD"

          # ── Loop over all top-level scalar fields dynamically ──────────────────
          while IFS='=' read -r key value; do
            echo "${key}=${value}" >> "$GITHUB_OUTPUT"
          done < <(
            echo "$PAYLOAD" | jq -r '
              to_entries[]
              | select(.key != "network")
              | select(.value | type == "string")
              | "\(.key)=\(.value)"
            '
          )
          # ── Network block: special split logic per subnet role ──────────────────
          echo "$PAYLOAD" | jq -r '
            .network | to_entries[] |
            if   .key == "eks"  then
              "public_subnet_cidr="  + (.value[:2]  | tojson),
              "private_subnet_cidr=" + (.value[2:4] | tojson)
            elif .key == "db"   then "rds_subnet_cidrs="       + (.value | tojson)
            elif .key == "node" then "nodegroup_subnet_cidrs=" + (.value | tojson)
            else                     "\(.key)="                + (.value | tojson)
            end
          ' >> "$GITHUB_OUTPUT"

  deploy-network:
    runs-on: ubuntu-latest
    needs: configure-variables
    env:
      ENVIRONMENT: ${{ needs.configure-variables.outputs.environment}}
      TF_VAR_region: ${{ needs.configure-variables.outputs.region }}
      TF_VAR_dev_cidr: ${{ needs.configure-variables.outputs.dev_cidr }}
      TF_VAR_existing_vpc_id: ${{ needs.configure-variables.outputs.existing_vpc_id }}
      TF_VAR_vpcname: ${{ needs.configure-variables.outputs.vpcname }}
      TF_VAR_createvpc: ${{ needs.configure-variables.outputs.createvpc }}
      TF_VAR_public_subnet_cidr_block: ${{ needs.configure-variables.outputs.public_subnet_cidr }}
      TF_VAR_private_subnet_cidr_block: ${{ needs.configure-variables.outputs.private_subnet_cidr }}
      TF_VAR_rds_private_subnet_cidr_blocks: ${{ needs.configure-variables.outputs.rds_subnet_cidrs }}
      TF_VAR_nodegroup_pvt_subnet_cidr_blocks: ${{ needs.configure-variables.outputs.nodegroup_subnet_cidrs }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::586098609239:role/GitHubActionsRole
          role-session-name: GitHub-Actions-OIDC-Session
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

    # Deploy Network Step
      - name: Deploy Network
        working-directory: ./environments/${{ env.ENVIRONMENT }}/network
        run: |
          terraform init -upgrade

      - name: Terraform Validate
        working-directory: ./environments/${{ env.ENVIRONMENT }}/network
        run: terraform validate 

      - name: Terraform Plan
        working-directory: ./environments/${{ env.ENVIRONMENT }}/network
        run: |
          terraform plan -out=tfplan
          terraform show -json tfplan > tfplan.json
          cat tfplan.json

      - name: Upload Network Plan
        uses: actions/upload-artifact@v4
        with:
          name: network-tfplan
          path: ./environments/${{ env.ENVIRONMENT }}/network/tfplan.json

      - name: Terraform Apply
        working-directory: ./environments/${{ env.ENVIRONMENT }}/network
        run: terraform apply -auto-approve tfplan    

  # Deploy IAM      
  deploy-iam:
    name: deploy-iam
    runs-on: ubuntu-latest
    needs: [configure-variables, deploy-network]
        
    steps:  
      - name: checkout-code
        uses: actions/checkout@v4
            
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::586098609239:role/GitHubActionsRole
          role-session-name: GitHub-Actions-OIDC-Session
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: false

      - name: Prepare Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./environments/${{ env.ENVIRONMENT }}/iam
        run: |
          terraform init

      - name: Terraform Plan
        working-directory: ./environments/${{ env.ENVIRONMENT }}/iam
        run: |
          terraform plan
      - name: Terraform Apply
        working-directory: ./environments/${{ env.ENVIRONMENT }}/iam
        run: terraform apply -auto-approve    
  
  # Deploy Cluster
  deploy-cluster:
    name: deploy-eks-cluster
    runs-on: ubuntu-latest
    needs: [configure-variables, deploy-network, deploy-iam]
    env:
      ENVIRONMENT: ${{ needs.configure-variables.outputs.environment}}
      TF_VAR_clustername: ${{ needs.configure-variables.outputs.clustername }}
      TF_VAR_region: ${{ needs.configure-variables.outputs.region }}
      TF_VAR_vpcname: ${{ needs.configure-variables.outputs.vpcname }}
      TF_VAR_createvpc: ${{ needs.configure-variables.outputs.createvpc }}
      TF_VAR_existing_vpc_id: ${{ needs.configure-variables.outputs.existing_vpc_id }}  

    steps:  
      - name: checkout-code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
              role-to-assume: arn:aws:iam::586098609239:role/GitHubActionsRole
              role-session-name: GitHub-Actions-OIDC-Session
              aws-region: ${{ env.AWS_REGION }}
              mask-aws-account-id: false
            
      - name: Prepare Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./environments/${{ env.ENVIRONMENT }}/cluster
        run: |
          terraform init -upgrade
            
      - name: Terraform Validate
        working-directory: ./environments/${{ env.ENVIRONMENT }}/cluster
        run: |
          terraform validate
            
      - name: Terraform Plan
        working-directory: ./environments/${{ env.ENVIRONMENT }}/cluster
        run: |
          echo "Running terraform plan for cluster ${TF_VAR_clustername} in environment ${ENVIRONMENT}"
          terraform plan -out=tfplan
          terraform show -json tfplan > tfplan.json
          cat tfplan.json 
      - name: Upload Cluster Plan
        uses: actions/upload-artifact@v4
        with:
          name: cluster-tfplan
          path: ./environments/${{ env.ENVIRONMENT }}/cluster/tfplan.json
          
      - name: Terraform Apply
        working-directory: ./environments/${{ env.ENVIRONMENT }}/cluster
        run: terraform apply -auto-approve tfplan