name: ephmrl-dev-eks

on:
  repository_dispatch:
    types: [ephmrl-dev-eks]

env:
  TF_VERSION: "1.5.0"
  AWS_REGION: "us-east-1"
  ENVIRONMENT: ${{ github.event.client_payload.config.environment }}
  CLUSTER_NAME: ${{ github.event.client_payload.config.projectName }}
  tfvarsFilename: "${{ github.event.client_payload.config.projectName }}.tfvars"

permissions:
  id-token: write
  contents: read  

jobs:
  deploy-network:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::586098609239:role/GitHubActionsRole
          role-session-name: GitHub-Actions-OIDC-Session
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: false

      - name: config_variables
        working-directory: ./environments/${{ env.ENVIRONMENT }}
        run: |
          pwd
          PAYLOAD=$(printf '%s' '${{ tojson(github.event.client_payload.config) }}')
          echo "Current Payload: $PAYLOAD"
          echo "--------------------------------"
          printf '%s' "$PAYLOAD" | jq -r 'to_entries[] |
          if .key == "network" then
            .value | to_entries[] |
            if .key == "eks" then
                "public_subnet_cidr_block=" + (.value[:2] | tostring),
                "private_subnet_cidr_block=" + (.value[2:4] | tostring)
            elif .key == "db" then "rds_private_subnet_cidr_blocks=\(.value)"
            elif .key == "node" then "nodegroup_pvt_subnet_cidr_blocks=\(.value)"
            else
              "\(.key)=\(.value | tojson)"
            end   
          else
          "\(.key)=\(.value | tojson)" 
          end' > ${{ env.tfvarsFilename }}
          echo "--------------------------------"
          find /home/runner/work/Infrastructure/Infrastructure/environments/${{ env.ENVIRONMENT }} -type f | sort
          cat ${{ env.tfvarsFilename }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

    # Deploy Network
      - name: Deploy Network
        working-directory: ./environments/${{ env.ENVIRONMENT }}/network
        run: |
          terraform init -upgrade
      - name: Terraform Validate
        working-directory: ./environments/${{ env.ENVIRONMENT }}/network
        run: terraform validate 
      - name: Terraform Plan
        working-directory: ./environments/${{ env.ENVIRONMENT }}/network
        run: |
          terraform plan -var-file="../${{ env.tfvarsFilename }}" -out=ephemeral-${{ env.ENVIRONMENT }}-eks.tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ env.ENVIRONMENT }}
          path: ./environments/${{ env.ENVIRONMENT }}/network/ephemeral-${{ env.ENVIRONMENT }}-eks.tfplan

  # Deploy IAM      
  deploy-iam:
    name: deploy-iam
    runs-on: ubuntu-latest
    needs: deploy-network
        
    steps:  
      - name: checkout-code
        uses: actions/checkout@v4
            
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::586098609239:role/GitHubActionsRole
          role-session-name: GitHub-Actions-OIDC-Session
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: false

      - name: Prepare Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./environments/${{ env.ENVIRONMENT }}/iam
        run: |
          terraform init

      - name: Terraform Plan
        working-directory: ./environments/${{ env.ENVIRONMENT }}/iam
        run: |
          terraform plan
  
  # Deploy Cluster
  deploy-cluster:
    name: deploy-eks-cluster
    runs-on: ubuntu-latest
    needs: [deploy-network, deploy-iam]

    steps:  
      - name: checkout-code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
              role-to-assume: arn:aws:iam::586098609239:role/GitHubActionsRole
              role-session-name: GitHub-Actions-OIDC-Session
              aws-region: ${{ env.AWS_REGION }}
              mask-aws-account-id: false
            
      - name: Prepare Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./environments/${{ env.ENVIRONMENT }}/cluster
        run: |
          terraform init -upgrade
            
      - name: Terraform Validate
        working-directory: ./environments/${{ env.ENVIRONMENT }}/cluster
        run: |
          terraform validate
            
      - name: Terraform Plan
        working-directory: ./environments/${{ env.ENVIRONMENT }}/cluster
        run: |
          terraform plan -var-file="../${{ env.tfvarsFilename }}"

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ env.ENVIRONMENT }}
          path: ./environments/${{ env.ENVIRONMENT }}/iam/ephemeral-${{ env.ENVIRONMENT }}-eks.tfplan   
          