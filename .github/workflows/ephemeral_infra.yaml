# Deployment sequence for ephemeral eks cluster
#   1. Configure TF_Vars
#   2. Deploy Network
#   3. Deploy IAM
#   4. Deploy Cluster
#        enable control-plane logging with Cloudwatch 
#   5. Configure Cluster Authentication
#    step1 --> configure aws-auth ConfigMap for role mappings
#    step2 --> configure OIDC provider for IRSA (IAM Roles for Service Accounts)
#   6. Nodegroup 
#   7. Certs
#   8. Database
#   9. Helm App+ingress Deployment
#   10.DNS (Route53 etc)
#    Consider using external-dns as a Helm chart in step 9 to automate Route53 record management, 
#    rather than managing it as a separate Terraform 
#    step. This would simplify the workflow and reduce the number of Terraform steps, while still achieving dynamic DNS management based on Kubernetes resources.

name: ephmrl-dev-eks

on:
  repository_dispatch:
    types: [ephmrl-dev-eks]

env:
  TF_VERSION: "1.5.0"
  AWS_REGION: "us-east-1"
  ENVIRONMENT: ${{ github.event.client_payload.config.environment }}

permissions:
  id-token: write
  contents: read  

jobs:
  configure-variables:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.parse_vars.outputs.environment }}
      clustername: ${{ steps.parse_vars.outputs.clustername }}
      region: ${{ steps.parse_vars.outputs.region }}
      dev_cidr: ${{ steps.parse_vars.outputs.dev_cidr }}
      vpcname: ${{ steps.parse_vars.outputs.vpcname }}
      createvpc: ${{ steps.parse_vars.outputs.createvpc }}
      existing_vpc_id: ${{ steps.parse_vars.outputs.existing_vpc_id }}
      public_subnet_cidr: ${{ steps.parse_vars.outputs.public_subnet_cidr }}
      private_subnet_cidr: ${{ steps.parse_vars.outputs.private_subnet_cidr }}
      rds_subnet_cidrs: ${{ steps.parse_vars.outputs.rds_subnet_cidrs }}
      nodegroup_subnet_cidrs: ${{ steps.parse_vars.outputs.nodegroup_subnet_cidrs }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::586098609239:role/GitHubActionsRole
          role-session-name: GitHub-Actions-OIDC-Session
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: false

      - name: config_variables
        shell: bash
        id: parse_vars
        working-directory: ./environments/${{ env.ENVIRONMENT }}
        run: |
          PAYLOAD=$(printf '%s' '${{ tojson(github.event.client_payload.config) }}')
          echo "Current Payload: $PAYLOAD"

          # ── Loop over all top-level scalar fields dynamically ──────────────────
          while IFS='=' read -r key value; do
            echo "${key}=${value}" >> "$GITHUB_OUTPUT"
          done < <(
            echo "$PAYLOAD" | jq -r '
              to_entries[]
              | select(.key != "network")
              | select(.value | type == "string")
              | "\(.key)=\(.value)"
            '
          )
          # ── Network block: special split logic per subnet role ──────────────────
          echo "$PAYLOAD" | jq -r '
            .network | to_entries[] |
            if   .key == "eks"  then
              "public_subnet_cidr="  + (.value[:2]  | tojson),
              "private_subnet_cidr=" + (.value[2:4] | tojson)
            elif .key == "db"   then "rds_subnet_cidrs="       + (.value | tojson)
            elif .key == "node" then "nodegroup_subnet_cidrs=" + (.value | tojson)
            else                     "\(.key)="                + (.value | tojson)
            end
          ' >> "$GITHUB_OUTPUT"
          cat $GITHUB_OUTPUT

  deploy-network:
    runs-on: ubuntu-latest
    needs: configure-variables
    env:
      ENVIRONMENT: ${{ needs.configure-variables.outputs.environment}}
      TF_VAR_region: ${{ needs.configure-variables.outputs.region }}
      TF_VAR_dev_cidr: ${{ needs.configure-variables.outputs.dev_cidr }}
      TF_VAR_existing_vpc_id: ${{ needs.configure-variables.outputs.existing_vpc_id }}
      TF_VAR_vpcname: ${{ needs.configure-variables.outputs.vpcname }}
      TF_VAR_createvpc: ${{ needs.configure-variables.outputs.createvpc }}
      TF_VAR_public_subnet_cidr_blocks: ${{ needs.configure-variables.outputs.public_subnet_cidr }}
      TF_VAR_private_subnet_cidr_blocks: ${{ needs.configure-variables.outputs.private_subnet_cidr }}
      TF_VAR_rds_private_subnet_cidr_blocks: ${{ needs.configure-variables.outputs.rds_subnet_cidrs }}
      TF_VAR_nodegroup_pvt_subnet_cidr_blocks: ${{ needs.configure-variables.outputs.nodegroup_subnet_cidrs }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::586098609239:role/GitHubActionsRole
          role-session-name: GitHub-Actions-OIDC-Session
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

    # Deploy Network Step
      - name: Deploy Network
        working-directory: ./environments/${{ env.ENVIRONMENT }}/network
        run: |
          terraform init -upgrade

      - name: Terraform Validate
        working-directory: ./environments/${{ env.ENVIRONMENT }}/network
        run: terraform validate 

      - name: Terraform Plan
        working-directory: ./environments/${{ env.ENVIRONMENT }}/network
        run: |
          terraform plan -out=tfplan
          terraform show -json tfplan > tfplan.json
          cat tfplan.json

      - name: Upload Network Plan
        uses: actions/upload-artifact@v4
        with:
          name: network-tfplan
          path: ./environments/${{ env.ENVIRONMENT }}/network/tfplan.json

      - name: Terraform Apply
        working-directory: ./environments/${{ env.ENVIRONMENT }}/network
        run: terraform apply -auto-approve tfplan    

  # Deploy IAM      
  deploy-iam:
    name: deploy-iam
    runs-on: ubuntu-latest
    needs: [configure-variables, deploy-network]
    env:
      ENVIRONMENT: ${{ needs.configure-variables.outputs.environment}}
      region: ${{ needs.configure-variables.outputs.region }}
        
    steps:  
      - name: checkout-code
        uses: actions/checkout@v4
            
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::586098609239:role/GitHubActionsRole
          role-session-name: GitHub-Actions-OIDC-Session
          aws-region: ${{ env.region }}
          mask-aws-account-id: false

      - name: Prepare Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./environments/${{ env.ENVIRONMENT }}/iam
        run: |
          terraform init

      - name: Terraform Plan
        working-directory: ./environments/${{ env.ENVIRONMENT }}/iam
        run: |
          terraform plan
      - name: Terraform Apply
        working-directory: ./environments/${{ env.ENVIRONMENT }}/iam
        run: terraform apply -auto-approve    
  
  # Deploy Cluster
  deploy-cluster:
    name: deploy-eks-cluster
    runs-on: ubuntu-latest
    needs: [configure-variables, deploy-network, deploy-iam]
    env:
      ENVIRONMENT: ${{ needs.configure-variables.outputs.environment }}
      TF_VAR_clustername: ${{ needs.configure-variables.outputs.clustername }}
      TF_VAR_region: ${{ needs.configure-variables.outputs.region }}
      TF_VAR_vpcname: ${{ needs.configure-variables.outputs.vpcname }}
      TF_VAR_createvpc: ${{ needs.configure-variables.outputs.createvpc }}
      TF_VAR_existing_vpc_id: ${{ needs.configure-variables.outputs.existing_vpc_id }}  

    steps:  
      - name: checkout-code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
              role-to-assume: arn:aws:iam::586098609239:role/GitHubActionsRole
              role-session-name: GitHub-Actions-OIDC-Session
              aws-region: ${{ env.AWS_REGION }}
              mask-aws-account-id: false
            
      - name: Prepare Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./environments/${{ env.ENVIRONMENT }}/cluster
        run: |
          terraform init -upgrade
            
      - name: Terraform Validate
        working-directory: ./environments/${{ env.ENVIRONMENT }}/cluster
        run: |
          terraform validate
            
      - name: Terraform Plan
        working-directory: ./environments/${{ env.ENVIRONMENT }}/cluster
        run: |
          echo "Running terraform plan for cluster ${TF_VAR_clustername} in environment ${ENVIRONMENT}"
          terraform plan -out=tfplan
          terraform show -json tfplan > tfplan.json
          cat tfplan.json 
      - name: Upload Cluster Plan
        uses: actions/upload-artifact@v4
        with:
          name: cluster-tfplan
          path: ./environments/${{ env.ENVIRONMENT }}/cluster/tfplan.json
          
      - name: Terraform Apply
        id: tf_apply
        working-directory: ./environments/${{ env.ENVIRONMENT }}/cluster
        run: terraform apply -auto-approve tfplan
        continue-on-error: true

      - name: Roll back on Failure
        if: steps.tf_apply.outcome == 'failure'
        working-directory: ./environments/${{ env.ENVIRONMENT }}/cluster
        run: |
          echo "Cluster deployment failed, rolling back changes"
          terraform destroy -auto-approve  -input=tfplan
          exit 1
        
      - name: Verify Cluster Deployment
        working-directory: ./environments/${{ env.ENVIRONMENT }}/cluster
        run: |
          echo "Verifying EKS Cluster Creation"
          CLUSTER_NAME="${{ env.TF_VAR_clustername }}"
          aws eks describe-cluster --name $CLUSTER_NAME --region ${{ env.TF_VAR_region }} --query 'cluster.status' --output text

          echo "Checking if cluster is active"
          TIMEOUT=900  # 15 minutes in seconds
          INTERVAL=30  # Check every 30 seconds
          ELAPSED=0

          echo "Checking EKS cluster status for up to 15 minutes..."

          while [ $ELAPSED -lt $TIMEOUT ]; do
          STATUS=$(aws eks describe-cluster --name $CLUSTER_NAME --region ${{ env.TF_VAR_region }} --query 'cluster.status' --output text)
          
          if [ "$STATUS" = "ACTIVE" ]; then
            echo "EKS Cluster $CLUSTER_NAME is active."
            exit 0
          fi
          
          echo "Cluster status: $STATUS. Waiting... ($ELAPSED/$TIMEOUT seconds elapsed)"
          sleep $INTERVAL
          ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "ERROR: EKS Cluster $CLUSTER_NAME did not become active within 15 minutes."
          echo "Final status: $STATUS"
          exit 1

  # Cluster Authentication for users and roles
  configure-auth:
    name: configure-auth
    runs-on: ubuntu-latest
    needs: [configure-variables, deploy-network, deploy-iam, deploy-cluster]
    env:
      ENVIRONMENT: ${{ needs.configure-variables.outputs.environment}}
      TF_VAR_clustername: ${{ needs.configure-variables.outputs.clustername }}
      TF_VAR_region: ${{ needs.configure-variables.outputs.region }}

    steps:  
      - name: checkout-code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
              role-to-assume: arn:aws:iam::586098609239:role/GitHubActionsRole
              role-session-name: GitHub-Actions-OIDC-Session
              aws-region: ${{ env.AWS_REGION }}
              mask-aws-account-id: false
            
      - name: Prepare Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Update kubeconfig
        run: |
          echo "Updating kubeconfig for cluster ${TF_VAR_clustername} in environment ${ENVIRONMENT}"
          aws eks update-kubeconfig --name ${{ env.TF_VAR_clustername }} --region ${{ env.TF_VAR_region }}
          kubectl config view    

      - name: Terraform Init
        working-directory: ./environments/${{ env.ENVIRONMENT }}/configuration/k8auth
        run: |
          terraform init -upgrade
            
      - name: Terraform Validate
        working-directory: ./environments/${{ env.ENVIRONMENT }}/configuration/k8auth
        run: |
          terraform validate
            
      - name: Terraform Plan
        working-directory: ./environments/${{ env.ENVIRONMENT }}/configuration/k8auth
        run: |
          echo "Running terraform plan for auth configuration of cluster ${TF_VAR_clustername} in environment ${ENVIRONMENT}"
          terraform plan -out=tfplan
          terraform show -json tfplan > tfplan.json
          cat tfplan.json 
      - name: Upload Auth Plan
        uses: actions/upload-artifact@v4
        with:
          name: auth-tfplan
          path: ./environments/${{ env.ENVIRONMENT }}/configuration/k8auth/tfplan.json
      
      - name: Terraform Apply
        working-directory: ./environments/${{ env.ENVIRONMENT }}/configuration/k8auth
        run: terraform apply -auto-approve tfplan
      
      - name: Verify Kubectl access to Cluster
        working-directory: ./environments/${{ env.ENVIRONMENT }}/configuration/k8auth
        run: |
          echo "Verifying kubectl access to EKS Cluster"
          aws eks update-kubeconfig --name ${{ env.TF_VAR_clustername }} --region ${{ env.TF_VAR_region }}
          kubectl get nodes
  
  # Deploy Nodegroups
  deploy-nodegroups:
    name: deploy-nodegroups
    runs-on: ubuntu-latest
    needs: [configure-variables, deploy-network, deploy-iam, deploy-cluster, configure-auth]
    env:
      ENVIRONMENT: ${{ needs.configure-variables.outputs.environment}}
      TF_VAR_clustername: ${{ needs.configure-variables.outputs.clustername }}
      TF_VAR_region: ${{ needs.configure-variables.outputs.region }}
    
    steps:  
      - name: checkout-code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
              role-to-assume: arn:aws:iam::586098609239:role/GitHubActionsRole
              role-session-name: GitHub-Actions-OIDC-Session
              aws-region: ${{ env.AWS_REGION }}
              mask-aws-account-id: false
            
      - name: Prepare Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false 

      - name: Terraform Init
        working-directory: ./environments/${{ env.ENVIRONMENT }}/nodegroups
        run: |
          terraform init -upgrade
            
      - name: Terraform Validate
        working-directory: ./environments/${{ env.ENVIRONMENT }}/nodegroups
        run: |
          terraform validate
            
      - name: Terraform Plan
        working-directory: ./environments/${{ env.ENVIRONMENT }}/nodegroups
        run: |
          echo "Running terraform plan for nodegroup configuration of cluster ${TF_VAR_clustername} in environment ${ENVIRONMENT}"
          terraform plan -out=tfplan
          terraform show -json tfplan > tfplan.json
          cat tfplan.json 
      - name: Upload Nodegroups Plan
        uses: actions/upload-artifact@v4
        with:
          name: nodegroups-tfplan
          path: ./environments/${{ env.ENVIRONMENT }}/nodegroups/tfplan.json
      
      - name: Terraform Apply
        working-directory: ./environments/${{ env.ENVIRONMENT }}/nodegroups
        run: terraform apply -auto-approve tfplan
  
  deploy-certs:
    name: deploy-certs
    runs-on: ubuntu-latest
    needs: [configure-variables, deploy-network, deploy-iam, deploy-cluster, configure-auth]
    outputs:
      cert_arn: ${{ steps.extract-cert-arn.outputs.cert_arn }}
    env:
      ENVIRONMENT: ${{ needs.configure-variables.outputs.environment}}
      TF_VAR_clustername: ${{ needs.configure-variables.outputs.clustername }}
      TF_VAR_region: ${{ needs.configure-variables.outputs.region }}


    steps:  
      - name: checkout-code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
              role-to-assume: arn:aws:iam::586098609239:role/GitHubActionsRole
              role-session-name: GitHub-Actions-OIDC-Session
              aws-region: ${{ env.TF_VAR_region }}
              mask-aws-account-id: false
            
      - name: Prepare Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./environments/${{ env.ENVIRONMENT }}/configuration/certs
        run: |
          terraform init -upgrade
            
      - name: Terraform Validate
        working-directory: ./environments/${{ env.ENVIRONMENT }}/configuration/certs
        run: |
          terraform validate
            
      - name: Terraform Plan
        working-directory: ./environments/${{ env.ENVIRONMENT }}/configuration/certs
        run: |
          echo "Running terraform plan for certs configuration of cluster ${TF_VAR_clustername} in environment ${ENVIRONMENT}"
          terraform plan -out=tfplan
          terraform show -json tfplan > tfplan.json
          cat tfplan.json 
      - name: Upload Certs Plan
        uses: actions/upload-artifact@v4
        with:
          name: certs-tfplan
          path: ./environments/${{ env.ENVIRONMENT }}/configuration/certs/tfplan.json

      - name: Terraform Apply
        working-directory: ./environments/${{ env.ENVIRONMENT }}/configuration/certs
        run: terraform apply -auto-approve tfplan
      
      - name: Extract Cert ARN output
        working-directory: ./environments/${{ env.ENVIRONMENT }}/configuration/certs
        id: extract-cert-arn
        run: |
          echo "Extracting cert ARN from terraform output"
          echo "cert_arn=$(terraform output -json | jq -r '.cert_arn.value')" >> $GITHUB_OUTPUT
          echo "Cert ARN: $(cat $GITHUB_OUTPUT)"

  deploy-app:
    name: deploy-app
    runs-on: ubuntu-latest
    needs: [configure-variables, deploy-network, deploy-iam, deploy-cluster, configure-auth, deploy-nodegroups, deploy-certs]
    env:
      ENVIRONMENT: ${{ needs.configure-variables.outputs.environment}}
      TF_VAR_clustername: ${{ needs.configure-variables.outputs.clustername }}
      TF_VAR_region: ${{ needs.configure-variables.outputs.region }}
      TF_VAR_image_repository: 586098609239.dkr.ecr.us-east-1.amazonaws.com/dev/gemapp
      TF_VAR_cert_arn: ${{ needs.deploy-certs.outputs.cert_arn }}
      HELM_RELEASE_NAME: "gem-app"
      HELM_CHART_PATH: "./helm-charts/gem-app"
      HELM_NAMESPACE: "gem-app-namespace"
      APP_VERSION: "dev-latest"

    steps:  
      - name: Checkout Helm Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
              role-to-assume: arn:aws:iam::586098609239:role/GitHubActionsRole
              role-session-name: GitHub-Actions-OIDC-Session
              aws-region: ${{ env.AWS_REGION }}
              mask-aws-account-id: false
      
      - name: Update kubeconfig
        run: |
          echo "Updating kubeconfig for cluster ${TF_VAR_clustername} in environment ${ENVIRONMENT}"
          aws eks update-kubeconfig --name ${{ env.TF_VAR_clustername }} --region ${{ env.TF_VAR_region }}
          kubectl config view
      
      - name: Install Helm
        uses: azure/setup-helm@v1
        with:
          version: v3.12.0
      
      - name: Login to ECR
        id: ecr-login
        run: |
          echo "Logging in to ECR for region ${TF_VAR_region}"
          aws ecr get-login-password --region ${{ env.TF_VAR_region }} | helm registry login --username AWS --password-stdin 586098609239.dkr.ecr.${{ env.TF_VAR_region }}.amazonaws.com    
      
      - name: Create Namespace
        run: |
          echo "Creating namespace ${HELM_NAMESPACE} for app deployment"
          kubectl create namespace ${HELM_NAMESPACE} || echo "Namespace ${HELM_NAMESPACE} already exists"    

      - name: Deploy App with Helm
        run : |
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} \
            --namespace ${{ env.HELM_NAMESPACE }} --create-namespace \
            --set image.repository=${{ env.TF_VAR_image_repository }} \
            --set service.annotations."alb\.ingress\.kubernetes\.io/certificate-arn"=${{ env.TF_VAR_cert_arn }} \
            --set service.annotations."alb\.ingress\.kubernetes\.io/listen-ports"='[{"HTTP":80},{"HTTPS":443}]' \
            --set ingress.enabled=true \
            --set image.tag=${{ env.APP_VERSION }} \
            --set environment=${ENVIRONMENT} \
            --values ${HELM_CHART_PATH}/values.yaml \
            --values ${HELM_CHART_PATH}/values-${ENVIRONMENT}.yaml \
            --timeout 10m \
            --wait \
            --atomic
      
      - name: Verify App Deployment
        run: |
          echo "Verifying app deployment in namespace ${HELM_NAMESPACE}"
          kubectl rollout status deployment/${{ env.HELM_RELEASE_NAME }} -n ${{ env.HELM_NAMESPACE }} --timeout=5m
          kubectl get all -n ${{ env.HELM_NAMESPACE }} --timeout=120s
      
      - name: Verify Ingress and ALB
        run: |
          echo "Verifying Ingress and ALB for the deployed app"
          kubectl get ingress -n ${{ env.HELM_NAMESPACE }} -o wide
          kubectl describe ingress -n ${{ env.HELM_NAMESPACE }}
      
      - name: Show deployed resources
        run: |
          echo "Showing all resources in namespace ${HELM_NAMESPACE}"
          kubectl get all -n ${{ env.HELM_NAMESPACE }} -o wide
      
      - name: Rollback on Failure
        if: failure()
        run: |
          echo "Deployment failed, rolling back release ${HELM_RELEASE_NAME}"
          helm rollback ${{ env.HELM_RELEASE_NAME }} --namespace ${{ env.HELM_NAMESPACE }} || echo "Rollback failed or no previous release to rollback to"
            

                
            

        
          

        