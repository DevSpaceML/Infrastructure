apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Release.Name }}-tls
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  commonName: {{ .Values.ingressRoute.host }}
  dnsNames:
    - {{ .Values.ingressRoute.host }}