apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dev
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: devspaceml@gmail.com
    privateKeySecretRef:
      name: letsencrypt-dev-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik