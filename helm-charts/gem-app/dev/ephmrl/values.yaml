# ─────────────────────────────────────────────────────────
# Traefik Helm chart values for Kubernetes deployment.
# ─────────────────────────────────────────────────────────
replicaCount: 2
image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: false
  annotations: {}
  name: ""
service:
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
ports:
  web:
    port: 8000
    exposedPort: 80
    containerPort: 8000
    targetPort: 8000
    expose:
      default: true
    protocol: TCP
  websecure:
    port: 8443
    exposedPort: 443
    containerPort: 8443
    targetPort: 8443
    expose:
      default: true
    protocol: TCP
providers:
  kubernetesIngress:
    enabled: true
  kubernetesCRD:
    enabled: true
additionalArguments:
  - "--providers.kubernetesingress.ingressendpoint.publishedservice=traefik/traefik"
logs:
  general:
    level: INFO
  access:
    enabled: true
    format: common