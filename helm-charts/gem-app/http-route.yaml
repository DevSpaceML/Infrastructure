apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-http-route
spec:
  parentRefs:
    - name: {{ .Release.Name }}-gateway
  hostnames:
    - {{ .Values.ingress.host }}
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: "/{{ .Release.Name }}"
      defaultBackendRefs:
        - name: {{ .Release.Name }}-service
          port: {{ .Values.app.port | int }}