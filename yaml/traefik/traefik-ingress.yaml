apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ Values.app.name }}-ingress
annotations:
  cert-manager.io/cluster-issuer: "letsencrypt-http"  
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`{{ Values.ingress.host }}`)"
      kind: Rule
      services:
        - name: {{ Values.app.name }}-service
          port: {{ Values.app.port }}
  tls: {}