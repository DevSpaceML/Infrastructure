# ─────────────────────────────────────────────────────────
# Traefik Helm chart values for Kubernetes deployment.
# ─────────────────────────────────────────────────────────
service:
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
ports:
  web:
    port: 80
    targetport: 8080
    expose:
      default: true
    protocol: TCP
  websecure:
    port: 443
    targetPort: 443
    expose:
      default: true
    protocol: TCP
additionalArguments:
  - "--entryPoints.web.address=:8080"
  - "--entryPoints.websecure.address=:8443"  
providers:
  kubernetesIngress:
    enabled: true
  kubernetesCRD:
    enabled: true    
logs:
  general:
    level: INFO
  access:
    enabled: true
    format: common