# ─────────────────────────────────────────────────────────
# Traefik Helm chart values for Kubernetes deployment.
# ─────────────────────────────────────────────────────────
service:
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
ports:
  web:
    port: 80
    containerPort: 8080
    targetPort: 8080
    expose:
      default: true
    protocol: TCP
  websecure:
    port: 443
    containerPort: 8443
    targetPort: 8443
    expose:
      default: true
    protocol: TCP
providers:
  kubernetesIngress:
    enabled: true
  kubernetesCRD:
    enabled: true
additionalArguments:
  - "--providers.kubernetesingress.ingressendpoint.publishedservice=traefik/traefik"
securityContext:
  capabilities:
    add:
      - NET_BIND_SERVICE
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532  
logs:
  general:
    level: INFO
  access:
    enabled: true
    format: common