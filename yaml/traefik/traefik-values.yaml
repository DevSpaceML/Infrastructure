app:
  name: "my-app"
  port: 8080
ingress:
  host: " "
service: 
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
ports:
  web:
    port: 80
    expose: true
    protocol: TCP
    redirections:
      entrypoint:
      to: websecure
      scheme: https
      permanent: true
  websecure:
    port: 443
    expose: true
    protocol: TCP
    tls:
      enabled: true
providers:
  kubernetesIngress:
    enabled: true
  kubernetesCRD:
    enabled: true 
logs:
  general:
    level: INFO
  access:
    enabled: true
    format: common                