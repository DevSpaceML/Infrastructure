# ─────────────────────────────────────────────────────────
# Traefik Helm chart values for Kubernetes deployment.
# ─────────────────────────────────────────────────────────
service:
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
ports:
  web:
    port: 8080
    expose:
      default: true
    protocol: TCP
  websecure:
    port: 443
    expose:
      default: true
    protocol: TCP
middlewares:
  - name: redirect-to-https
    redirectScheme:
     scheme: https
     permanent: true   
providers:
  kubernetesIngress:
    enabled: true
  kubernetesCRD:
    enabled: true    
logs:
  general:
    level: INFO
  access:
    enabled: true
    format: common